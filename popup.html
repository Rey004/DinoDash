<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DinoDash</title>
    <link rel="icon" type="image/webp" href="assets/brand/logo-dark.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            width: 660px;
            height: 350px;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        /* ── Grain & Scanline Overlays ── */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 99;
            opacity: 0.04;
            mix-blend-mode: overlay;
            background-image: radial-gradient(#ffffff 1px, transparent 1px);
            background-size: 3px 3px;
        }
        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 98;
            mix-blend-mode: overlay;
            background: repeating-linear-gradient(rgba(255, 255, 255, 0.02) 0 1px, transparent 1px 3px);
        }

        .popup-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        /* ── Header ── */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .header:hover {
            opacity: 0.8;
        }

        .dino-icon {
            width: 28px;
            height: 28px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .popup-header__logo {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        .header-text h1 {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: #ffffff;
        }

        .sys-status {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            font-size: 9px;
            letter-spacing: 0.25em;
            color: rgba(255, 255, 255, 0.45);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pulse-dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            background: #ffffff;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* ── Grid Layout ── */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 14px;
            padding: 12px 18px;
            flex: 1;
            overflow: hidden;
        }

        .grid-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
            height: 100%;
        }

        .column-header {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.25em;
            color: rgba(255, 255, 255, 0.4);
            border-bottom: 1px dashed rgba(255, 255, 255, 0.15);
            padding-bottom: 5px;
            text-transform: uppercase;
        }

        .column-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
            padding-right: 2px;
        }

        /* Column scrollbars */
        .column-content::-webkit-scrollbar {
            width: 3px;
        }
        .column-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        .section-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
        }

        .section-title {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 6px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }

        .row-label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
        }

        .row-icon {
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.65;
        }

        .row-icon svg {
            width: 12px;
            height: 12px;
            color: #ffffff;
        }

        select {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            font-size: 10px;
            padding: 3px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: #000000;
            color: #ffffff;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: #ffffff;
        }

        /* ── Toggle Switch ── */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 18px;
            flex-shrink: 0;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #000000;
            border-radius: 18px;
            transition: background 0.2s, border-color 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
        .slider::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            left: 3px;
            bottom: 3px;
            background: #ffffff;
            border-radius: 50%;
            transition: transform 0.2s, background 0.2s;
        }
        input:checked + .slider {
            background: #ffffff;
            border-color: #ffffff;
        }
        input:checked + .slider::before {
            transform: translateX(16px);
            background: #000000;
        }

        /* ── Widget Manager Styles ── */
        .widget-manage--expanded {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .widget-manage__hint {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .widget-tag-group {
            margin-bottom: 8px;
        }
        .widget-tag-group:last-child {
            margin-bottom: 0;
        }
        .widget-tag-group__label {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 4px;
            display: block;
        }
        .widget-tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .widget-tag {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 3px 5px 3px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 600;
        }
        .widget-tag--active {
            background: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
        }
        .widget-tag--inactive {
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            padding-left: 3px;
        }
        .widget-tag__action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }
        .widget-tag__action--remove {
            background: rgba(0, 0, 0, 0.15);
            color: #000000;
        }
        .widget-tag__action--add {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            margin-right: 1px;
        }
        .widget-tag__action--add:hover {
            background: #ffffff;
            color: #000000;
        }

        /* ── Profile & Action Layouts ── */
        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 8px;
        }
        .score-chip {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 6px 4px;
            text-align: center;
        }
        .score-chip .label {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }
        .score-chip .value {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            font-size: 13px;
            font-weight: 700;
            color: #ffffff;
            margin-top: 2px;
        }

        .footer-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 2px;
        }

        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 8px;
            border: 1px solid #ffffff;
            border-radius: 6px;
            background: #ffffff;
            color: #000000;
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .btn-primary:hover {
            background: #000000;
            color: #ffffff;
        }

        .btn-ghost-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .btn-ghost {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 6px;
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            font-size: 10px;
            font-weight: 600;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            text-decoration: none;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }

        .btn-ghost:hover {
            color: #ffffff;
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-ghost svg {
            width: 10px;
            height: 10px;
            stroke: currentColor;
            fill: none;
        }

        /* ── Tooltips ── */
        [data-tooltip] {
            position: relative;
        }
        [data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 50%;
            bottom: calc(100% + 6px);
            transform: translateX(-50%) translateY(3px);
            z-index: 120;
            max-width: 180px;
            padding: 4px 6px;
            border-radius: 4px;
            background: #000000;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.12s, transform 0.12s, visibility 0.12s;
        }
        [data-tooltip]:hover::after {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Footer ── */
        .footer-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 18px 8px;
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            font-size: 8px;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
        }

        /* Enhanced mode disabled state styling: only dims dependent controls, keeping navigation fully functional */
        body.disabled #section-game,
        body.disabled #section-widgets,
        body.disabled #section-appearance {
            opacity: 0.35;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Grain and scanline overlays -->
    <div class="grain"></div>
    <div class="scanlines"></div>

    <div class="popup-wrapper">
        <!-- Header -->
        <div class="header-container">
            <a class="header" href="https://use-dino-dash.vercel.app/" target="_blank" rel="noopener noreferrer"
               data-tooltip="Visit DinoDash website">
                <div class="dino-icon">
                    <img class="brand-logo popup-header__logo"
                        src="assets/brand/logo-dark.webp"
                        alt="DinoDash logo" width="28" height="28" decoding="async">
                </div>
                <div class="header-text">
                    <h1>DinoDash</h1>
                </div>
            </a>
            <div class="sys-status">
                <span class="pulse-dot"></span>sys · active
            </div>
        </div>

        <!-- Dashboard Grid (3 Columns) -->
        <div class="dashboard-grid">
            <!-- Column 1: Core Controls -->
            <div class="grid-column">
                <div class="column-header">sys.control</div>
                <div class="column-content">
                    <!-- General -->
                    <div class="section-card">
                        <div class="section-title">General</div>
                        <div class="row">
                            <div class="row-label">
                                <span class="row-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M13 2L4.5 13.5H12L11 22l8.5-11.5H12L13 2z" fill="currentColor" stroke="none"/>
                                    </svg>
                                </span>
                                Enhanced Mode
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="enhancement-toggle">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <!-- Game -->
                    <div class="section-card" id="section-game">
                        <div class="section-title">Game Options</div>
                        <div class="row">
                            <div class="row-label">
                                <span class="row-icon">
                                    <svg viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5L12 2z"/>
                                    </svg>
                                </span>
                                Particles
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="popup-particles" checked>
                                <span class="slider"></span>
                            </label>
                        </div>

                        <div class="row">
                            <div class="row-label">
                                <span class="row-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"/>
                                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                                    </svg>
                                </span>
                                Sound
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="popup-audio" checked>
                                <span class="slider"></span>
                            </label>
                        </div>

                        <div class="row">
                            <div class="row-label">
                                <span class="row-icon">
                                    <svg viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/>
                                    </svg>
                                </span>
                                Messages
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="popup-messages" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Column 2: Widgets Tag Manager -->
            <div class="grid-column">
                <div class="column-header">sys.widgets</div>
                <div class="column-content">
                    <div class="section-card" id="section-widgets" style="height: 100%;">
                        <div id="popup-widget-list" data-widget-display="expanded"></div>
                    </div>
                </div>
            </div>

            <!-- Column 3: Stats & Actions -->
            <div class="grid-column">
                <div class="column-header">sys.profile</div>
                <div class="column-content">
                    <!-- Score & Theme Chip -->
                    <div class="section-card">
                        <div class="score-grid">
                            <div class="score-chip">
                                <div class="label">Hi Score</div>
                                <div class="value" id="popup-hi-score">00000</div>
                            </div>
                            <div class="score-chip">
                                <div class="label">Theme</div>
                                <div class="value" id="popup-theme-name">—</div>
                            </div>
                        </div>
                    </div>

                    <!-- Appearance Theme selector -->
                    <div class="section-card" id="section-appearance">
                        <div class="row" data-tooltip="Choose active theme">
                            <div class="row-label">
                                <span class="row-icon">
                                    <svg viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M12 2C6.48 2 2 6.48 2 12c0 5.52 4.48 10 10 10 1.1 0 2-.9 2-2v-.5c0-.55.45-1 1-1h2c2.76 0 5-2.24 5-5C22 6.48 17.52 2 12 2zm-5 9a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3-4a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm4 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3 4a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/>
                                    </svg>
                                </span>
                                Active
                            </div>
                            <select id="popup-theme-select">
                                <option value="dark" selected>Dark Valley</option>
                                <option value="mysticForest">Mystic Forest</option>
                            </select>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="footer-actions">
                        <button class="btn-primary" id="open-tab-btn" data-tooltip="Open DinoDash in a new tab">Open New Tab</button>
                        <div class="btn-ghost-row">
                            <a class="btn-ghost" id="docs-btn" href="https://use-dino-dash.vercel.app/docs" target="_blank" rel="noopener noreferrer" data-tooltip="Read docs">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                                </svg>
                                <span>Docs</span>
                            </a>
                            <a class="btn-ghost" id="feedback-btn" href="https://use-dino-dash.vercel.app/feedback" target="_blank" rel="noopener noreferrer" data-tooltip="Submit feedback">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                                </svg>
                                <span>Feedback</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom status bar -->
        <div class="footer-bar">
            <span>sys · dinodash</span>
            <span>v1.0</span>
        </div>
    </div>

    <script type="module" src="popup.js"></script>
</body>
</html>
