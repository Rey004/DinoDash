<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="game-container">
        <!-- Main Game Canvas -->
        <canvas id="game-canvas"></canvas>

        <!-- UI Overlay -->
        <div id="ui-layer">
            <div id="score-container">
                <span id="score-label">HI <span id="hi-score">00000</span></span>
                <span id="current-score">00000</span>
            </div>

            <div id="native-ui-layer" class="native-ui">
                <div class="top-nav">
                    <a href="https://mail.google.com" class="nav-link">Gmail</a>
                    <a href="https://images.google.com" class="nav-link">Images</a>
                    <a href="https://myaccount.google.com/" class="profile-icon">
                        <span>R</span>
                    </a>
                </div>

                <div class="center-content">
                    <div class="logo">Google</div>
                    <form class="search-box" id="search-form" action="https://www.google.com/search" method="GET">
                        <div class="search-icon">
                            <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="#9aa0a6"></path></svg>
                        </div>
                        <input type="text" name="q" id="search-input" autocomplete="off" placeholder="Search Google or type a URL">
                    </form>
                    <div id="start-hint">Press <kbd>SPACE</kbd> to start the enhanced dino game</div>
                </div>
            </div>
            
            <div class="enhancement-toggle-container">
                <label class="ui-switch" title="Turn off enhanced mode">
                    <input type="checkbox" id="main-ui-enhancement-toggle" checked>
                    <span class="ui-slider"></span>
                </label>
                <span class="ui-switch-label">Enhanced Mode</span>
            </div>
            
            <div id="settings-button" title="Customize this page" class="customize-button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            </div>

            <div id="settings-panel" class="overlay-panel hidden">
                <h2>Settings</h2>
                <div class="setting-row">
                    <label>Theme</label>
                    <select id="theme-select">
                        <option value="classic">Classic</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="nature">Nature</option>
                        <option value="space">Space</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>Particles</label>
                    <input type="checkbox" id="toggle-particles" checked>
                </div>
                <div class="setting-row">
                    <label>Music/SFX</label>
                    <input type="checkbox" id="toggle-audio" checked>
                </div>
                <div class="setting-row">
                    <label>Show FPS</label>
                    <input type="checkbox" id="toggle-fps">
                </div>
                <button id="close-settings">Close</button>
            </div>

            <div id="fps-counter" class="hidden">FPS: <span>60</span></div>
        </div>
    </div>

    <!-- Application Bootstrap -->
    <script type="module" src="main.js"></script>
</body>
</html>
