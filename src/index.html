<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Enhanced</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="game-container">
        <!-- Main Game Canvas -->
        <canvas id="game-canvas"></canvas>

        <!-- UI Overlay -->
        <div id="ui-layer">
            <div id="score-container">
                <span id="score-label">HI <span id="hi-score">00000</span></span>
                <span id="current-score">00000</span>
            </div>

            <div id="native-ui-layer" class="native-ui">
                <div class="top-nav">
                    <a href="https://mail.google.com" class="nav-link">Gmail</a>
                    <a href="https://images.google.com" class="nav-link">Images</a>
                    <a href="https://myaccount.google.com/" class="profile-icon">
                        <span>R</span>
                    </a>
                </div>

                <div class="center-content">
                    <div class="logo">Google</div>
                    <form class="search-box" id="search-form" action="https://www.google.com/search" method="GET">
                        <div class="search-icon">
                            <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="#9aa0a6"></path></svg>
                        </div>
                        <input type="text" name="q" id="search-input" autocomplete="off" placeholder="Search Google or type a URL">
                        <div class="mic-icon" title="Search by voice">
                            <svg focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="m12 15c1.66 0 3-1.31 3-2.97v-7.02c0-1.66-1.34-3.01-3-3.01s-3 1.34-3 3.01v7.02c0 1.66 1.34 2.97 3 2.97z" fill="#4285f4"></path><path d="m11 18.08h2v3.92h-2z" fill="#34a853"></path><path d="m7.05 16.87c-1.27-1.33-2.05-2.83-2.05-4.87h2c0 1.45.56 2.42 1.47 3.38v.32l-1.15 1.18z" fill="#f4b400"></path><path d="m12 16.93a4.97 5.25 0 0 1 -3.54 -1.55l-1.41 1.49c1.26 1.34 3.02 2.13 4.95 2.13 3.87 0 6.99-2.92 6.99-7h-1.99c0 2.92-2.24 4.93-5 4.93z" fill="#ea4335"></path></svg>
                        </div>
                        <div class="lens-icon" title="Search by image">
                            <svg focusable="false" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg"><rect fill="none" height="192" width="192"></rect><g><circle cx="144" cy="144" fill="#34a853" r="16"></circle><circle cx="96" cy="96" fill="#4285f4" r="24"></circle><path d="M60,112H48c-8.84,0-16-7.16-16-16V60h12v36c0,2.21,1.79,4,4,4h12V112z" fill="#ea4335"></path><path d="M144,48c8.84,0,16,7.16,16-16v32h-12V64c0-2.21-1.79-4-4-4h-32V48H144z" fill="#f4b400"></path><path d="M144,144h-32v12h32c8.84,0,16-7.16,16-16v-28h-12V144z" fill="#4285f4"></path><path d="M48,80H36V48c0-8.84,7.16-16,16-16h32v12H52c-2.21,0-4,1.79-4,4V80z" fill="#ea4335"></path></g></svg>
                        </div>
                    </form>
                    <div id="start-hint">Press <kbd>SPACE</kbd> to start the enhanced dino game</div>
                </div>
            </div>
            
            <div id="settings-button" title="Customize this page" class="customize-button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            </div>

            <div id="settings-panel" class="overlay-panel hidden">
                <h2>Settings</h2>
                <div class="setting-row">
                    <label>Theme</label>
                    <select id="theme-select">
                        <option value="classic">Classic</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="nature">Nature</option>
                        <option value="space">Space</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>Particles</label>
                    <input type="checkbox" id="toggle-particles" checked>
                </div>
                <div class="setting-row">
                    <label>Music/SFX</label>
                    <input type="checkbox" id="toggle-audio" checked>
                </div>
                <div class="setting-row">
                    <label>Show FPS</label>
                    <input type="checkbox" id="toggle-fps">
                </div>
                <button id="close-settings">Close</button>
            </div>

            <div id="fps-counter" class="hidden">FPS: <span>60</span></div>
        </div>
    </div>

    <!-- Application Bootstrap -->
    <script type="module" src="main.js"></script>
</body>
</html>
